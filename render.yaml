services:
  - type: web
    name: classiroute-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_DAYS
        value: "30"
      - key: ENCRYPTION_KEY
        sync: false
      - key: DB_SCHEMA
        value: public
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        sync: false
      - key: SENTRY_DSN
        sync: false
